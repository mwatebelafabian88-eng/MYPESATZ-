<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MyPesatz Test</title>
  <script src="https://sdk.minepi.com/pi-sdk.js"></script>
</head>
<body style="text-align:center; padding:50px; font-family:Arial;">
  <h2>MyPesatz</h2>
  <button id="btn" style="padding:15px 30px; background:#7b2cbf; color:white; border:none; border-radius:8px; font-size:16px;">
    Login with Pi
  </button>
  <div id="msg" style="margin-top:20px;"></div>

  <script>
    Pi.init({ version: "2.0", sandbox: true });

    document.getElementById('btn').onclick = function() {
      Pi.authenticate(['username', 'payments'], function(payment){})
        .then(function(auth){
          document.getElementById('msg').innerHTML = '✅ Karibu ' + auth.user.username;
          alert('Login imefanya kazi! Sasa tunaunda payment...');
        })
        .catch(function(err){
          alert('Error: ' + err);
        });
    }
  </script>
</body>
</html>
