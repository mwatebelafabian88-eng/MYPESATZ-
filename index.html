<!DOCTYPE html>
<html lang="sw">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MYPESATZ</title>
<style>body{font-family:Arial;background:#f5f7fa;padding:20px;text-align:center}
.card{background:white;padding:20px;border-radius:12px;max-width:400px;margin:auto}
button{background:#2e7d32;color:white;border:none;padding:12px;border-radius:8px;width:100%;font-size:16px}</style>
<script src="https://sdk.minepi.com/pi-sdk.js"></script></head>
<body><div class="card">
<h1>MYPESATZ CheckList</h1>
<input type="checkbox" id="dawa"> Nimekunywa dawa<br><br>
<button onclick="lipaTestnet()">Jaribu Pi 0.01 Testnet</button>
<p id="ujumbe"></p></div>
<script>Pi.init({ version: "2.0" });
function lipaTestnet(){Pi.createPayment({amount:0.01,memo:"Test MYPESATZ",metadata:{}},
{onReadyForServerApproval:(id)=>fetch('/api/approve.js',{method:'POST',body:JSON.stringify({paymentId:id})}),
onReadyForServerCompletion:(id,tx)=>{fetch('/api/complete.js',{method:'POST',body:JSON.stringify({paymentId:id,txid:tx})});
document.getElementById('ujumbe').innerText="✅ Testnet Imefanikiwa! Core Team wataridhika"}})}</script>
</body></html>
