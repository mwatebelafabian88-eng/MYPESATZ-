<!DOCTYPE html>
<html lang="sw">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MYPESATZ Testnet</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      padding: 50px;
      background: #f5f5f5;
    }
    button {
      background: #6C4CE6;
      color: white;
      border: none;
      padding: 15px 30px;
      font-size: 18px;
      border-radius: 10px;
      cursor: pointer;
    }
    button:hover {
      background: #5539cc;
    }
  </style>
</head>
<body>
  <h2>MYPESATZ Testnet</h2>
  <p>Bonyeza chini kujaribu kulipa 0.01 Pi Testnet</p>
  
  <button onclick="payNow()">Lipa na Pi</button>

  <script src="https://sdk.minepi.com/pi-sdk.js"></script>
  <script>
    // Initialize Pi SDK - sandbox true for testnet
    Pi.init({ version: "2.0", sandbox: true });

    async function payNow() {
      try {
        // Step 1: Authenticate user first - required by Pi Core Team
        const scopes = ['username', 'payments'];
        const auth = await Pi.authenticate(scopes);
        console.log("Authenticated:", auth.user.username);

        // Step 2: Create payment
        await Pi.createPayment({
          amount: 0.01,
          memo: "Test payment MYPESATZ",
          metadata: { orderId: "test123" },

          callbacks: {
            onReadyForServerApproval: async function(paymentId) {
              console.log("Approving payment:", paymentId);
              // Hapa unaweza kutuma paymentId kwa backend yako
              // Kwa sasa tunaacha hivi kwa Testnet
            },

            onReadyForServerCompletion: async function(paymentId, txid) {
              console.log("Completing payment:", paymentId, txid);
              alert("Malipo yamefanikiwa! Asante.");
            },

            onCancel: function(paymentId) {
              console.log("Payment cancelled:", paymentId);
              alert("Uleghairi malipo");
            },

            onError: function(error, payment) {
              console.error("Payment error:", error);
              alert("Kuna tatizo: " + error);
            }
          }
        });

      } catch (error) {
        console.error("Error:", error);
        alert("Error: " + error);
      }
    }
  </script>
</body>
</html>
