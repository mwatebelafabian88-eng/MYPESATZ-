<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MyPesatz</title>

<script src="https://sdk.minepi.com/pi-sdk.js"></script>

<style>
body{
margin:0;
padding:0;
font-family:Arial,sans-serif;
background:#ffffff;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
text-align:center;
padding:30px;
max-width:400px;
}

.logo{
font-size:40px;
margin-bottom:10px;
color:#6f3ff5;
}

h1{
color:#333;
}

button{
background:#6f3ff5;
color:white;
border:none;
padding:15px 25px;
border-radius:10px;
font-size:16px;
cursor:pointer;
margin-top:15px;
width:100%;
}

button:hover{
opacity:0.9;
}

.status{
margin-top:20px;
color:#444;
font-size:14px;
}
</style>
</head>

<body>

<div class="container">

<div class="logo">π</div>

<h1>MyPesatz</h1>

<p>Test Payment 0.01 Pi</p>

<button onclick="payWithPi()">
Pay with Pi
</button>

<div class="status" id="status">
Ready
</div>

</div>

<script>

Pi.init({
version: "2.0",
sandbox: true
});

let currentUser = null;

function onIncompletePaymentFound(payment){
console.log("Incomplete Payment:", payment);
}

async function authenticate(){

try{

const scopes = ['payments'];

const auth = await Pi.authenticate(
scopes,
onIncompletePaymentFound
);

currentUser = auth.user;

document.getElementById("status").innerHTML =
"Logged in as: " + auth.user.username;

return auth;

}catch(error){

console.error(error);

document.getElementById("status").innerHTML =
"Authentication failed";

}

}

authenticate();

function payWithPi(){

const paymentData = {

amount: 0.01,

memo: "MyPesatz Test Payment",

metadata: {
app: "MyPesatz",
type: "test-payment"
}

};

const paymentCallbacks = {

onReadyForServerApproval: function(paymentId){

console.log("Ready For Approval", paymentId);

},

onReadyForServerCompletion: function(paymentId, txid){

console.log("Payment Success");

document.getElementById("status").innerHTML =
"Payment Successful ✅";

},

onCancel: function(paymentId){

console.log("Cancelled");

document.getElementById("status").innerHTML =
"Payment Cancelled";

},

onError: function(error){

console.error(error);

document.getElementById("status").innerHTML =
"Payment Error";

}

};

Pi.createPayment(
paymentData,
paymentCallbacks
);

}

</script>

</body>
</html>
