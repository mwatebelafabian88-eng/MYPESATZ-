<!DOCTYPE html>
<html lang="sw">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MIATATU- Pi Login + Payment</title>
  
  <script src="https://sdk.minepi.com/pi-sdk.js" defer></script>
  
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
      text-align: center;
      background: #f0f2f5;
    }
    .card {
      background: white;
      max-width: 400px;
      margin: 50px auto;
      padding: 40px;
      border-radius: 16px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
    }
    #loginBtn {
      background: #6B46C1;
      color: white;
      border: none;
      padding: 16px 32px;
      font-size: 16px;
      border-radius: 10px;
      cursor: pointer;
      width: 100%;
      font-weight: bold;
    }
    #loginBtn:disabled {
      background: #ccc;
      cursor: not-allowed;
    }
    #userInfo {
      margin-top: 20px;
      font-size: 16px;
      padding: 12px;
      border-radius: 8px;
      min-height: 20px;
    }
    .success { background: #d4edda; color: #155724; }
    .error { background: #f8d7da; color: #721c24; }
    .info { background: #d1ecf1; color: #0c5460; }
  </style>
</head>
<body>
  <div class="card">
    <h2>MIATATU</h2>
    <p>Test Login + Payment 0.01 Pi</p>
    <button id="loginBtn" disabled>Inapakia SDK...</button>
    <div id="userInfo" class="info">Subiri...</div>
  </div>

  <script>
  window.addEventListener('load', () => {
    const API_URL = 'https://MYPESATZ.VERCEL.APP'; // API URL YAKO
    const btn = document.getElementById('loginBtn');
    const userInfo = document.getElementById('userInfo');

    function showStatus(msg, type='info') {
      userInfo.className = type;
      userInfo.innerHTML = msg;
    }

    if (typeof Pi === 'undefined') {
      showStatus('❌ Fungua ukurasa huu ndani ya Pi Browser', 'error');
      btn.innerText = 'Fungua Pi Browser';
      return;
    }

    Pi.init({ 
      version: "2.0", 
      sandbox: true,
      onIncompletePaymentFound: function(payment) {
        showStatus('MIATATU: Inakamilisha malipo ya zamani...', 'info');
        payment.submit();
      }
    });

    btn.disabled = false;
    btn.innerText = 'Login na Pi - MIATATU';
    showStatus('MIATATU tayari', 'info');

    btn.addEventListener('click', async function() {
      try {
        btn.disabled = true;
        showStatus('MIATATU: Inaunganisha Wallet...', 'info');
        
        const scopes = ['username', 'payments'];
        
        const auth = await Pi.authenticate(scopes, function(payment) {
          console.log("Incomplete payment:", payment);
        });
        
        showStatus('✅ Karibu MIATATU, <b>' + auth.user.username + '</b>', 'success');
        console.log('Login success:', auth);
        
        // Baada ya login, fanya payment test
        setTimeout(makeTestPayment, 1000);
        
      } catch (error) {
        console.error('Login failed:', error);
        showStatus('❌ Login imeshindwa: ' + error, 'error');
        btn.disabled = false;
      }
    });

    async function makeTestPayment() {
      try {
        showStatus('MIATATU : Inatengeneza malipo...', 'info');
        
        await Pi.createPayment({
          amount: 0.01,
          memo: "MIATATU Test Payment",
          metadata: { 
            app: "MIATATU",
            orderId: "MIATATU_" + Date.now() 
          },
          
          onReadyForServerApproval: async function(paymentId) {
            showStatus('MIATATU: Server ina-approve...', 'info');
            console.log("Ready for approval:", paymentId);
            
            // HAPA NDIO KITU KIKUBWA: Piga backend yako
            await fetch https://mypesatz.vercel.app/api/approve', {
              method: 'POST',
              headers: {'Content-Type': 'application/json'},
              body: JSON.stringify({paymentId, app: 'MIATATU'})
            });
          },
          
          onReadyForServerCompletion: async function(paymentId, txid) {
            showStatus('MIATATU: Server inakamilisha...', 'info');
            console.log("Ready for completion:", paymentId, txid);
            
            // HAPA: Piga backend kukamilisha
            await fetch(const API_URL =  https://mypesatz.vercel.app/api/complete', {
              method: 'POST',
              headers: {'Content-Type': 'application/json'},
              body: JSON.stringify({paymentId, txid, app: 'MIATATU
