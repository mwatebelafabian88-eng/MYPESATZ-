<script>
  function onIncompletePaymentFound(payment) {
    console.log("Incomplete payment:", payment);
  }

  document.getElementById('loginBtn').addEventListener('click', function() {
    const scopes = ['username', 'payments'];
    
    Pi.authenticate(scopes, onIncompletePaymentFound)
      .then(function(auth) {
        document.getElementById('userInfo').innerHTML = 
          '✅ Karibu <b>' + auth.user.username + '</b>';
        
        makeTestPayment();
      })
      .catch(function(error) {
        alert('Login imeshindwa: ' + error);
      });
  });

  function makeTestPayment() {
    const paymentData = {
      amount: 0.01,
      memo: "Test payment from mypesatz",
      metadata: { orderId: "12345" }
    };

    const callbacks = {
      onReadyForServerApproval: function(paymentId) {
        console.log("Payment ID:", paymentId);
        
        // Hapa tunaonyesha button ya approve
        document.getElementById('userInfo').innerHTML += 
          '<br><br><button id="approveBtn" style="background:#00c851;color:white;padding:10px 20px;border:none;border-radius:8px;cursor:pointer;">Approve Payment</button>';
        
        document.getElementById('approveBtn').onclick = function() {
          approvePayment(paymentId);
        };
      },
      
      onReadyForServerCompletion: function(paymentId, txid) {
        alert("Payment complete! TxID: " + txid);
      },
      
      onCancel: function(paymentId) {
        alert("Umeghairi malipo");
      },
      
      onError: function(error) {
        alert("Hitilafu: " + error);
      }
    };

    Pi.createPayment(paymentData, callbacks);
  }

  function approvePayment(paymentId) {
    Pi.approvePayment(paymentId)
      .then(function() {
        alert("Approved! Sasa bonyeza Complete kwenye Pi Browser > Payments > Pending");
        document.getElementById('approveBtn').innerText = "Approved ✓";
        document.getElementById('approveBtn').disabled = true;
      })
      .catch(function(error) {
        alert("Approve imeshindwa: " + error);
      });
  }
</script>
