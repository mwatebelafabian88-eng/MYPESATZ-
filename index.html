<!DOCTYPE html>
<html lang="sw">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MyPesatz - Pi Payment</title>
  <script src="https://sdk.minepi.com/pi-sdk.js"></script>
  <style>
    body { font-family: Arial; display: flex; justify-content: center; align-items: center; min-height: 100vh; background: #f0f2f5; margin: 0; }
    .card { background: white; padding: 40px; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); text-align: center; max-width: 400px; }
    h2 { color: #6B46C1; margin-bottom: 10px; }
    p { color: #666; margin-bottom: 30px; }
    button { background: #6B46C1; color: white; padding: 16px 32px; border: none; border-radius: 10px; font-size: 16px; font-weight: bold; cursor: pointer; width: 100%; }
    button:disabled { background: #ccc; cursor: not-allowed; }
    #status { margin-top: 20px; padding: 12px; border-radius: 8px; font-size: 14px; }
    .success { background: #d4edda; color: #155724; }
    .error { background: #f8d7da; color: #721c24; }
    .info { background: #d1ecf1; color: #0c5460; }
  </style>
</head>
<body>
  <div class="card">
    <h2>MyPesatz</h2>
    <p>Bonyeza chini kuanza test payment ya 0.01 Pi</p>
    <button id="pi-btn">Login & Pay with Pi</button>
    <div id="status"></div>
  </div>

  <script>
    const statusDiv = document.getElementById('status');
    const btn = document.getElementById('pi-btn');

    function showStatus(msg, type='info') {
      statusDiv.className = type;
      statusDiv.innerText = msg;
    }

    function onIncompletePaymentFound(payment) {
      showStatus('Kuna malipo kamili: ' + payment.identifier, 'info');
      console.log('Incomplete payment found:', payment);
    }

    // MUHIMU: Anzisha Pi SDK kwanza
    Pi.init({ 
      version: "2.0", 
      sandbox: true  // Weka false ukienda Mainnet
    });

    btn.onclick = async function() {
      try {
        btn.disabled = true;
        showStatus('Inaunganisha Pi Wallet...', 'info');

        const scopes = ['username', 'payments'];
        const auth = await Pi.authenticate(scopes, onIncompletePaymentFound);
        showStatus('Umeunganishwa: ' + auth.user.username, 'success');

        showStatus('Inatengeneza malipo...', 'info');
        const paymentData = {
          amount: 0.01,
          memo: "Test payment MyPesatz",
          metadata: { orderId: "order_" + Date.now() }
        };
        
        const payment = await Pi.createPayment(paymentData);
        showStatus('Malipo yamefunguliwa! Nenda Pi Wallet kukamilisha', 'success');
        console.log('Payment created:', payment.identifier);
        
      } catch (err) {
        showStatus('Kosa: ' + err.message, 'error');
        console.error(err);
        btn.disabled = false;
      }
    }
  </script>
</body>
</html>
